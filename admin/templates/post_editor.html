{% extends "base.html" %}

{% block title %}{% if is_new %}New Post{% else %}Edit: {{ post.title }}{% endif %}{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/jodit@4.2.27/es2021/jodit.min.css">
<script src="https://unpkg.com/jodit@4.2.27/es2021/jodit.min.js"></script>
{% endblock %}

{% block content %}
<div class="editor-page">
    <div class="editor-header">
        <h1>{% if is_new %}New Blog Post{% else %}Edit Post{% endif %}</h1>
        <div class="editor-actions">
            <button class="btn btn-secondary" onclick="history.back()">Cancel</button>
            <button class="btn btn-primary" id="saveBtn" onclick="savePost()">Save</button>
            {% if not is_new %}
            <button class="btn btn-success" id="commitBtn" onclick="commitToGithub()">Save & Commit to GitHub</button>
            {% endif %}
        </div>
    </div>

    <form id="postForm" class="editor-form">
        <div class="form-row">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" value="{{ post.title if post else '' }}" required>
            </div>
            <div class="form-group">
                <label for="pubDate">Publication Date</label>
                <input type="date" id="pubDate" name="pubDate" value="{{ post.pubDate if post else '' }}">
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="2">{{ post.description if post else '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="heroImage">Hero Image (optional)</label>
            <input type="text" id="heroImage" name="heroImage" value="{{ post.heroImage if post else '' }}" placeholder="./images/my-image.jpg">
        </div>

        <div class="form-group">
            <label for="editor">Content</label>
            <textarea id="editor">{{ post.body | safe if post else '' }}</textarea>
        </div>
    </form>

    <div id="status" class="status-message"></div>
</div>

<script>
const isNew = {{ 'true' if is_new else 'false' }};
const slug = '{{ post.slug if post else '' }}';

const editor = Jodit.make('#editor', {
    height: 500,
    toolbarButtonSize: 'middle',
    buttons: [
        'bold', 'italic', 'underline', '|',
        'ul', 'ol', '|',
        'outdent', 'indent', '|',
        'paragraph', 'font', 'fontsize', '|',
        'image', 'link', 'table', '|',
        'align', '|',
        'undo', 'redo', '|',
        'hr', 'eraser', 'fullsize'
    ],
    uploader: {
        url: '/api/upload',
        format: 'json',
        filesVariableName: function() { return 'upload'; },
        isSuccess: function(resp) {
            return !resp.error;
        },
        getMsg: function(resp) {
            return resp.error ? resp.error.message : 'Upload successful';
        },
        process: function(resp) {
            return {
                files: [resp.url],
                path: '',
                baseurl: '',
                error: resp.error ? 1 : 0,
                msg: resp.error ? resp.error.message : ''
            };
        },
        defaultHandlerSuccess: function(data) {
            if (data.files && data.files.length) {
                this.s.insertImage(data.files[0]);
            }
        }
    },
    imageDefaultWidth: 400,
    resizer: {
        showSize: true,
        useAspectRatio: true
    }
});

function showStatus(message, isError = false) {
    const status = document.getElementById('status');
    status.textContent = message;
    status.className = 'status-message ' + (isError ? 'error' : 'success');
    status.style.display = 'block';
    setTimeout(() => { status.style.display = 'none'; }, 5000);
}

function getFormData() {
    return {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        pubDate: document.getElementById('pubDate').value || new Date().toISOString().split('T')[0],
        heroImage: document.getElementById('heroImage').value,
        body: editor.value
    };
}

function savePost() {
    const data = getFormData();

    if (!data.title) {
        showStatus('Title is required', true);
        return;
    }

    const url = isNew ? '/api/posts' : `/api/posts/${slug}`;

    fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
        if (result.success || result.slug) {
            showStatus('Post saved successfully!');
            if (isNew && result.slug) {
                window.location.href = `/posts/${result.slug}`;
            }
        } else {
            showStatus('Error: ' + (result.error || 'Unknown error'), true);
        }
    })
    .catch(error => {
        showStatus('Error saving post: ' + error.message, true);
    });
}

function commitToGithub() {
    const data = getFormData();

    fetch(`/api/posts/${slug}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
        if (!result.success) {
            throw new Error(result.error || 'Failed to save');
        }

        return fetch('/api/git/commit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                file_path: `src/content/blog/${slug}.md`,
                commit_message: `Update blog post: ${data.title}`
            })
        });
    })
    .then(response => response.json())
    .then(result => {
        if (result.success) {
            showStatus(result.message || 'Committed to GitHub!');
        } else {
            showStatus('Error: ' + (result.error || 'Unknown error'), true);
        }
    })
    .catch(error => {
        showStatus('Error: ' + error.message, true);
    });
}
</script>
{% endblock %}
