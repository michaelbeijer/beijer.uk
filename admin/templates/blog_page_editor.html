{% extends "base.html" %}

{% block title %}Edit Blog Page{% endblock %}

{% block content %}
<div class="editor-page">
    <div class="editor-header">
        <h1>Edit Blog Page</h1>
        <div class="editor-actions">
            <button class="btn btn-secondary" onclick="history.back()">Cancel</button>
            <button class="btn btn-primary" id="saveBtn" onclick="saveBlogPage()">Save</button>
            <button class="btn btn-success" id="commitBtn" onclick="commitToGithub()">Save & Commit to GitHub</button>
        </div>
    </div>

    <form id="blogPageForm" class="editor-form">
        <div class="form-group">
            <label for="title">Page Title</label>
            <input type="text" id="title" name="title" value="{{ blog.title }}" required>
            <small>Heading shown at the top of the blog listing page</small>
        </div>

        <div class="form-group">
            <label for="intro">Introduction (optional)</label>
            <textarea id="intro" name="intro" rows="3">{{ blog.intro }}</textarea>
            <small>Optional intro text shown below the title. Line breaks are preserved.</small>
        </div>
    </form>

    <div id="status" class="status-message"></div>
</div>

<script>
function showStatus(message, isError = false) {
    const status = document.getElementById('status');
    status.textContent = message;
    status.className = 'status-message ' + (isError ? 'error' : 'success');
    status.style.display = 'block';
    setTimeout(() => { status.style.display = 'none'; }, 5000);
}

function getFormData() {
    return {
        title: document.getElementById('title').value,
        intro: document.getElementById('intro').value,
    };
}

function saveBlogPage() {
    const data = getFormData();
    if (!data.title) { showStatus('Title is required', true); return; }

    fetch('/api/blog-page', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(result => {
        if (result.success) showStatus('Blog page saved!');
        else showStatus('Error: ' + (result.error || 'Unknown error'), true);
    })
    .catch(err => showStatus('Error: ' + err.message, true));
}

function commitToGithub() {
    const data = getFormData();
    if (!data.title) { showStatus('Title is required', true); return; }

    fetch('/api/blog-page', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(result => {
        if (!result.success) throw new Error(result.error || 'Failed to save');
        return fetch('/api/git/commit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                file_path: 'src/content/blog-page/index.md',
                commit_message: 'Update blog page settings'
            })
        });
    })
    .then(r => r.json())
    .then(result => {
        if (result.success) showStatus(result.message || 'Committed to GitHub!');
        else showStatus('Error: ' + (result.error || 'Unknown error'), true);
    })
    .catch(err => showStatus('Error: ' + err.message, true));
}
</script>
{% endblock %}
