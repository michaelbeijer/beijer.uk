<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} | michaelbeijer.co.uk</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="admin-nav">
        <div class="nav-brand">
            <a href="{{ url_for('index') }}">michaelbeijer.co.uk</a>
        </div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Dashboard</a>
            <a href="{{ url_for('posts') }}" class="{% if request.endpoint in ['posts', 'edit_post', 'new_post'] %}active{% endif %}">Posts</a>
            <a href="{{ url_for('blog_page') }}" class="{% if request.endpoint == 'blog_page' %}active{% endif %}">Blog Page</a>
            <a href="{{ url_for('pages') }}" class="{% if request.endpoint in ['pages', 'edit_page', 'new_page'] %}active{% endif %}">Pages</a>
            <a href="{{ url_for('home') }}" class="{% if request.endpoint == 'home' %}active{% endif %}">Home</a>
            <a href="{{ url_for('nav') }}" class="{% if request.endpoint == 'nav' %}active{% endif %}">Navigation</a>
            <a href="{{ url_for('appearance') }}" class="{% if request.endpoint == 'appearance' %}active{% endif %}">Appearance</a>
        </div>
        <div class="nav-user">
            <span>{{ session.get('github_user', 'dev-user') }}</span>
            <a href="{{ url_for('logout') }}" class="btn-logout">Logout</a>
        </div>
    </nav>

    <main class="admin-main">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
