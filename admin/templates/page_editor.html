{% extends "base.html" %}

{% block title %}{% if is_new %}New Page{% else %}Edit: {{ page.title }}{% endif %}{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
<script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
<script src="/static/js/easymde-setup.js"></script>
{% endblock %}

{% block content %}
<div class="editor-page">
    <div class="editor-header">
        <h1>{% if is_new %}New Page{% else %}Edit Page{% endif %}</h1>
        <div class="editor-actions">
            <button class="btn btn-secondary" onclick="history.back()">Cancel</button>
            <button class="btn btn-primary" id="saveBtn" onclick="savePage()">Save</button>
        </div>
    </div>

    <form id="pageForm" class="editor-form">
        <div class="form-row">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" value="{{ page.title if page else '' }}" required>
            </div>
            {% if is_new %}
            <div class="form-group">
                <label for="slug">Slug (URL)</label>
                <input type="text" id="slug" name="slug" placeholder="auto-generated from title">
            </div>
            {% else %}
            <div class="form-group">
                <label>Slug</label>
                <input type="text" value="{{ page.slug }}" disabled>
            </div>
            {% endif %}
        </div>

        <div class="form-group">
            <label for="description">Description (for SEO)</label>
            <textarea id="description" name="description" rows="2">{{ page.description if page else '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="editor">Content</label>
            <textarea id="editor">{{ page.body | safe if page else '' }}</textarea>
        </div>
    </form>

    <div id="status" class="status-message"></div>
</div>

<script>
const isNew = {{ 'true' if is_new else 'false' }};
const slug = '{{ page.slug if page else '' }}';

const editor = createEditor('editor');

function showStatus(message, isError = false) {
    const status = document.getElementById('status');
    status.textContent = message;
    status.className = 'status-message ' + (isError ? 'error' : 'success');
    status.style.display = 'block';
    setTimeout(() => { status.style.display = 'none'; }, 5000);
}

function getFormData() {
    const data = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        body: editor.value()
    };

    if (isNew) {
        const slugInput = document.getElementById('slug');
        if (slugInput && slugInput.value) {
            data.slug = slugInput.value;
        }
    }

    return data;
}

function savePage() {
    const data = getFormData();

    if (!data.title) {
        showStatus('Title is required', true);
        return;
    }

    const url = isNew ? '/api/pages' : `/api/pages/${slug}`;

    fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
        if (result.success || result.slug) {
            if (isNew && result.slug) {
                window.location.href = `/pages/${result.slug}`;
                return;
            }
            return fetch('/api/git/commit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    file_path: `src/content/pages/${slug}.md`,
                    commit_message: `Update page: ${data.title}`
                })
            })
            .then(response => response.json())
            .then(commitResult => {
                if (commitResult.success) {
                    showStatus('Saved and committed to GitHub!');
                } else {
                    showStatus('Saved, but commit failed: ' + (commitResult.error || 'Unknown error'), true);
                }
            });
        } else {
            showStatus('Error: ' + (result.error || 'Unknown error'), true);
        }
    })
    .catch(error => {
        showStatus('Error saving page: ' + error.message, true);
    });
}
</script>
{% endblock %}
